# .github/workflows/ci.yml
name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # job de qualidade de código — roda primeiro
  # se o código não passa no lint, não faz sentido rodar os testes
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check "src/**/*.ts"

      - name: Run lint
        run: npm run lint

  # testes de users — roda em paralelo com tasks e auth
  test-users:
    name: 'Tests: Users'
    runs-on: ubuntu-latest
    # só roda se o code-quality passar —
    # não faz sentido testar código que nem compila direito
    needs: code-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run users service tests
        run: npm run test:users:service

      - name: Run users controller tests
        run: npm run test:users:controller

  # testes de tasks — roda em paralelo com users e auth
  test-tasks:
    name: 'Tests: Tasks'
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tasks service tests
        run: npm run test:tasks:service

      - name: Run tasks controller tests
        run: npm run test:tasks:controller

  # testes de auth — roda em paralelo com users e tasks
  test-auth:
    name: 'Tests: Auth'
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run auth service tests
        run: npm run test:auth:service

      - name: Run auth controller tests
        run: npm run test:auth:controller

  # cobertura — roda só depois que todos os testes passarem
  # garante que o relatório só é gerado com 100% verde
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-users, test-tasks, test-auth]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage report
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
